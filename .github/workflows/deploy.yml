# Builds the static site from an Airtable snapshot and deploys it to GitHub Pages.
#
# Content changes in Airtable are NOT deployed automatically — run this
# workflow manually from the Actions tab ("Run workflow") to publish them.
# Code changes deploy automatically on push to main.
name: Build and deploy site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache downloaded Airtable images
        uses: actions/cache@v4
        with:
          path: .cache/airtable-images
          key: airtable-images-${{ github.run_id }}
          restore-keys: |
            airtable-images-

      - name: Fetch Airtable snapshot
        run: node scripts/fetch-airtable.mjs
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
